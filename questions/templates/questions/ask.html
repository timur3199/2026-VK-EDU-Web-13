{% extends 'base.html' %}
{% block title %}Задать вопрос{% endblock %}
{% block main %}
<div class="ask-page">
  <div class="ask-card">
    <div class="form-title">Задать вопрос</div>
    <div class="mb-4">
      <label class="form-label">Заголовок вопроса</label>
      <input type="text" class="form-control" placeholder="Кратко опишите суть вопроса…" />
      <div class="form-text">Будьте конкретны — хороший заголовок привлечёт больше ответов.</div>
    </div>
    <div class="mb-4">
      <label class="form-label">Описание</label>
      <textarea class="form-control" rows="8" placeholder="Подробно опишите вашу проблему, что вы пробовали и что ожидали получить…"></textarea>
    </div>
    <div class="mb-4">
      <label class="form-label">Теги</label>
      <input type="text" class="form-control" placeholder="python, django, orm…" />
      <div class="form-text">До 5 тегов через запятую.</div>
    </div>
    <button class="btn-primary-brand">Опубликовать вопрос</button>
  </div>
</div>
{% endblock %}
