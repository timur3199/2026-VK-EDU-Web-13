<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Войти — AskMe</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23E84855'/><text x='16' y='23' font-family='Arial' font-weight='bold' font-size='20' fill='white' text-anchor='middle'>?</text></svg>" />
  <link rel="stylesheet" href="static/css/reset.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <a href="index.html" class="site-logo">Ask<span>Me</span></a>
        <div class="header-search">
          <div class="input-group">
            <input type="text" placeholder="Поиск по вопросам…" aria-label="Поиск" />
            <button type="button" aria-label="Найти">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803a7.5 7.5 0 0010.607 0z"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="header-actions">
          <div class="auth-links">
            <a href="login.html" style="color:var(--brand);font-weight:600;">Войти</a>
            <span class="sep">|</span>
            <a href="signup.html">Регистрация</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="site-main">
    <div class="form-page">
      <div class="form-card">

        <div class="form-title">Добро пожаловать!</div>
        <p class="form-subtitle">
          Нет аккаунта? <a href="signup.html">Зарегистрируйтесь</a>
        </p>

        <div class="form-error-banner" id="loginError" style="display:none;">
          <strong>Ошибка входа.</strong> Вы ввели неправильный логин или пароль. Попробуйте ещё раз.
        </div>

        <form novalidate>

          <!-- Username -->
          <div class="mb-3">
            <label class="form-label" for="loginUsername">Имя пользователя</label>
            <input
              id="loginUsername"
              type="text"
              class="form-control"
              placeholder="Ваш логин"
              autocomplete="username"
              required
            />
            <div class="invalid-feedback">Введите имя пользователя.</div>
          </div>

          <!-- Password -->
          <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-1">
              <label class="form-label mb-0" for="loginPassword">Пароль</label>
              <a href="#" style="font-size:.8125rem;">Забыли пароль?</a>
            </div>
            <input
              id="loginPassword"
              type="password"
              class="form-control"
              placeholder="Ваш пароль"
              autocomplete="current-password"
              required
            />
          </div>

          <button type="submit" class="btn-primary-brand">Войти</button>

        </form>

      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container d-flex flex-wrap justify-content-between align-items-center gap-2">
      <span>© 2026 <strong>AskMe</strong> — платформа вопросов и ответов</span>
      <div class="d-flex gap-3">
        <a href="#">О проекте</a>
        <a href="#">Правила</a>
        <a href="#">Контакты</a>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="static/js/main.js"></script>
</body>
</html>
