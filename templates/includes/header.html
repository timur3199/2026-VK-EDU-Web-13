{% load static %}
<header class="site-header">
  <div class="container">
    <div class="header-inner">
      <a href="{% url 'index' %}" class="site-logo">Ask<span>Me</span></a>

      <div class="header-search">
        <div class="input-group">
          <input type="text" placeholder="Поиск по вопросам…" aria-label="Поиск" />
          <button type="button" aria-label="Найти">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803a7.5 7.5 0 0010.607 0z" />
            </svg>
          </button>
        </div>
      </div>

      <div class="header-actions">
        {% if request.user.is_authenticated %}
          <a href="{% url 'ask' %}" class="btn-ask">+ Задать вопрос</a>
          <a href="{% url 'profile' %}" class="auth-username" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
            <div style="width:32px;height:32px;border-radius:50%;background:#E84855;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0;">
              {% if request.user.profile.avatar %}
                <img src="{{ request.user.profile.avatar.url }}" style="width:100%;height:100%;object-fit:cover;" />
              {% else %}
                {{ request.user.username|slice:':2'|upper }}
              {% endif %}
            </div>
            <span>{{ request.user.username }}</span>
          </a>
          <form method="post" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.path }}" />
            <button type="submit" class="btn-logout">Выйти</button>
          </form>
        {% else %}
          <a href="{% url 'ask' %}" class="btn-ask" title="Войдите, чтобы задать вопрос" style="opacity:.5;pointer-events:none;">+ Задать вопрос</a>
          <div class="auth-links">
            <a href="{% url 'login' %}?next={{ request.path }}">Войти</a>
            <span class="sep">|</span>
            <a href="{% url 'signup' %}">Регистрация</a>
          </div>
        {% endif %}
      </div>
    </div>
  </div>
</header>
