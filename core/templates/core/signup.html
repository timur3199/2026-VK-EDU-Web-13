{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}
{% block main %}
<div class="form-page">
  <div class="form-card">
    <div class="form-title">Регистрация</div>
    <div class="form-subtitle">Уже есть аккаунт? <a href="{% url 'login' %}">Войдите</a></div>

    <form method="post" novalidate>
      {% csrf_token %}

      {% for field in form %}
        <div class="mb-3">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="form-error">{{ field.errors.0 }}</div>{% endif %}
        </div>
      {% endfor %}

      <button type="submit" class="btn-primary-brand">Создать аккаунт</button>
    </form>
  </div>
</div>
{% endblock %}
