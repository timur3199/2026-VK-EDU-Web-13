{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}
{% block main %}
<div class="form-page">
  <div class="form-card">
    <div class="form-title">Регистрация</div>
    <div class="form-subtitle">Уже есть аккаунт? <a href="{% url 'login' %}">Войдите</a></div>
    <div class="mb-3">
      <label class="form-label">Логин</label>
      <input type="text" class="form-control" placeholder="Придумайте логин" />
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" placeholder="your@email.com" />
    </div>
    <div class="mb-3">
      <label class="form-label">Пароль</label>
      <input type="password" class="form-control" placeholder="Не менее 8 символов" />
    </div>
    <div class="mb-4">
      <label class="form-label">Повторите пароль</label>
      <input type="password" class="form-control" placeholder="Повторите пароль" />
    </div>
    <button class="btn-primary-brand">Создать аккаунт</button>
  </div>
</div>
{% endblock %}
