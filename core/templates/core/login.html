{% extends 'base.html' %}
{% block title %}Вход{% endblock %}
{% block main %}
<div class="form-page">
  <div class="form-card">
    <div class="form-title">Вход</div>
    <div class="form-subtitle">Нет аккаунта? <a href="{% url 'signup' %}">Зарегистрируйтесь</a></div>
    <div class="mb-3">
      <label class="form-label">Логин</label>
      <input type="text" class="form-control" placeholder="Ваш логин" />
    </div>
    <div class="mb-4">
      <label class="form-label">Пароль</label>
      <input type="password" class="form-control" placeholder="Ваш пароль" />
    </div>
    <button class="btn-primary-brand">Войти</button>
  </div>
</div>
{% endblock %}
